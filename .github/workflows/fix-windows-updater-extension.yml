name: Fix Windows updater extension

# cargo-dist (v0.31.0) uploads the axoupdater binary on Windows without a
# .exe suffix, so the bare `*-pc-windows-*-update` asset on the GitHub
# release is a PE32+ executable that Windows won't recognize as one.
# This job runs after the Release workflow finishes and:
#   1. downloads the unsuffixed Windows updater asset(s)
#   2. re-uploads them with a .exe suffix
#   3. deletes the original unsuffixed asset(s)
#   4. patches references in dist-manifest.json and the PowerShell installer
#      so the installer can still resolve the renamed asset
# sha256.sum does not list updater binaries, so it is left untouched.
#
# release.yml is autogenerated by `dist` and rejects manual edits, so the
# fix lives in its own workflow.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to fix (e.g. v1.2.3 or v1.2.3-rc.1)
        required: true
        type: string
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  fix:
    name: Rename Windows updater asset
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: write
    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG_FROM_RUN="${{ github.event.workflow_run.head_branch }}"

            if echo "$TAG_FROM_RUN" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
              TAG="$TAG_FROM_RUN"
            fi

            if [ -z "$TAG" ]; then
              TAG=$(gh api "repos/${{ github.repository }}/releases?per_page=100" \
                --jq '.[] | select(.target_commitish == "${{ github.event.workflow_run.head_sha }}") | .tag_name' | head -n 1)
            fi

            if [ -z "$TAG" ]; then
              echo "Unable to resolve release tag for workflow run ${{ github.event.workflow_run.id }} (sha=${{ github.event.workflow_run.head_sha }})"
              exit 1
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Rename updater asset and patch references
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"

          gh release download "$TAG" --repo "$REPO" \
            --pattern '*-pc-windows-*-update' \
            --pattern 'dist-manifest.json' \
            --pattern '*-installer.ps1' || true

          renamed=0
          for src in *-pc-windows-*-update; do
            mv "$src" "$src.exe"
            gh release upload "$TAG" --repo "$REPO" --clobber "$src.exe"
            gh release delete-asset "$TAG" --repo "$REPO" --yes "$src"
            renamed=$((renamed + 1))
          done

          if [ "$renamed" -eq 0 ]; then
            echo "No unsuffixed Windows updater assets found on $TAG; nothing to do."
            exit 0
          fi

          for f in dist-manifest.json *-installer.ps1; do
            [ -f "$f" ] || continue
            sed -i -E 's/("[^"]*-pc-windows-[^"]*-update)"/\1.exe"/g' "$f"
            gh release upload "$TAG" --repo "$REPO" --clobber "$f"
          done
