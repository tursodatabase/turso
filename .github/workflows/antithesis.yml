name: Antithesis experiment

on:
  # Allows the workflow to be triggered manually
  workflow_dispatch:
    inputs:
      test_name:
        description: "Name to differentiate this run (optional)"
        required: false
        default: ""
        type: string
      duration:
        description: "Duration in minutes (min 15, default 4 hours)"
        required: false
        default: 240
        type: number
      diff_base:
        description: "Branch or SHA to diff against for targeted testing (leave blank for no targeted testing)"
        required: false
        default: ""
        type: string
      notify_everyone:
        description: "Notify everyone of test results"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      test_name:
        required: true
        type: string
      duration:
        required: true
        type: number
      diff_base:
        required: false
        default: ""
        type: string
      notify_everyone:
        required: false
        default: false
        type: boolean

env:
  ANTITHESIS_DOCKER_HOST: us-central1-docker.pkg.dev
  ANTITHESIS_DOCKER_REPO: ${{ secrets.ANTITHESIS_DOCKER_REPO }}
  ANTITHESIS_REGISTRY_KEY: ${{ secrets.ANTITHESIS_REGISTRY_KEY }}

jobs:
  test:
    runs-on: blacksmith

    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Generate diff for targeted testing
      if: ${{ inputs.diff_base != '' }}
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        DIFF_BASE: ${{ inputs.diff_base }}
        HEAD_SHA: ${{ github.sha }}
      run: |
        curl --fail --silent --show-error --location \
          -H "Accept: application/vnd.github.diff" \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/$REPO/compare/$DIFF_BASE...$HEAD_SHA" \
          -o testing/stress/git.diff
        python3 scripts/antithesis/diff_to_targeted_coverage.py \
          testing/stress/git.diff -o testing/stress/targeted_coverage.json

    - name: Publish workload
      run: bash ./scripts/antithesis/publish-workload.sh

    - name: Publish config
      run: bash ./scripts/antithesis/publish-config.sh

    - name: Run Antithesis Tests
      uses: antithesishq/antithesis-trigger-action@v0.5
      with:
        notebook_name: limbo
        tenant: ${{ secrets.ANTITHESIS_TENANT }}
        username: ${{ secrets.ANTITHESIS_USER }}
        password: ${{ secrets.ANTITHESIS_PASSWD }}
        github_token: ${{ secrets.ANTITHESIS_GITHUB_TOKEN }}
        config_image: ${{ secrets.ANTITHESIS_DOCKER_REPO }}/limbo-config:antithesis-latest
        images: ${{ secrets.ANTITHESIS_DOCKER_REPO }}/limbo-workload:antithesis-latest
        description: >-
          Turso - ${{ github.event_name }}
          on ${{ github.ref_name }} (${{ github.sha }})
          by ${{ github.actor }}${{ inputs.test_name && format(' ({0})', inputs.test_name) || '' }}${{ inputs.diff_base && format(' diff vs {0}', inputs.diff_base) || '' }}
        email_recipients: ${{ inputs.notify_everyone && secrets.ANTITHESIS_EMAIL || '' }}
        test_name: ${{ inputs.test_name }}
        additional_parameters: |-
          antithesis.duration=${{ inputs.duration }}
          antithesis.source=${{ github.ref_name }}
          custom.use_targeted_fuzzing=${{ inputs.diff_base != '' }}