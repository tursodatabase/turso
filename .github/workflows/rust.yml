  test-limbo:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup mold linker
        uses: "./.github/shared/setup-mold"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true

      - name: Install uv
        uses: useblacksmith/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - uses: "./.github/shared/install_sqlite"
      - name: Test
        run: make test

  concurrent-simulator:
    name: "Concurrent simulator (${{ matrix.toolchain.label }}, ${{ matrix.profile.name }})"
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - label: stable
            version: "1.88.0"
            rustflags: ""
          - label: nightly
            version: "nightly-2025-12-17"
            rustflags: "--cfg nightly"
        profile:
          - name: in-process
            iterations: 100
            args: "--mode fast --reopen-probability 0.001"
          - name: in-process-mvcc
            iterations: 25
            args: "--mode fast --reopen-probability 0.01 --enable-mvcc --allocation-fault-probability 0.01"
          - name: schema-clone-faults
            iterations: 10
            args: "--mode schema-clone-faults --reopen-probability 0.0001 --allocation-fault-probability 0.01"
          - name: btree-rebalance
            iterations: 5
            args: "--mode btree-rebalance --allocation-fault-probability 0"
          - name: multiprocess
            iterations: 10
            args: "--mode fast --multiprocess --connections-per-process 4 --processes 4"
          - name: multiprocess-kill
            iterations: 10
            args: "--mode fast --multiprocess --connections-per-process 4 --processes 4 --kill-probability 0.01"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain.version }}
      - name: Setup mold linker
        uses: "./.github/shared/setup-mold"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-whopper-${{ matrix.toolchain.label }}"
          cache-on-failure: true
      - name: Run turso_whopper regression tests
        if: matrix.profile.name == 'in-process'
        env:
          RUSTFLAGS: ${{ matrix.toolchain.rustflags }}
        run: cargo +${{ matrix.toolchain.version }} test -p turso_whopper --test regression_tests
        timeout-minutes: 15
      - name: Run turso_whopper (${{ matrix.toolchain.label }}, ${{ matrix.profile.name }})
        env:
          RUSTFLAGS: ${{ matrix.toolchain.rustflags }}
        run: |
          cargo +${{ matrix.toolchain.version }} build -p turso_whopper --release
          for i in $(seq 1 ${{ matrix.profile.iterations }}); do
            ./target/release/turso_whopper ${{ matrix.profile.args }} || exit 1
          done

  concurrent-simulator-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true
      - name: Run Windows concurrent simulator multiprocess regressions
        run: cargo test -q -p turso_whopper --test regression_tests
      - name: Run Windows concurrent simulator cross-platform regression
        run: cargo test -q -p turso_whopper --test regression_tests_cross_platform
      - name: Run Windows CLI multiprocess VFS regression
        run: cargo test -q -p turso_cli input::tests::experimental_win_iocp_backend_is_available_for_path_databases -- --exact
      - name: Run Windows core multiprocess regressions
        run: |
          cargo test -q -p turso_core --features "fs experimental_win_iocp" multiprocess_tests:: -- --nocapture
      - name: Run Windows multiprocess startup smoke
        run: cargo run -q -p turso_whopper -- --mode fast --multiprocess --connections-per-process 4 --processes 4 --kill-probability 0.01 --max-steps 10000

  test-sqlite:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: "./.github/shared/install_sqlite"
      - name: build SQLite test extensions
        run: cargo build --package limbo_sqlite_test_ext --locked
      - name: Test
        run: SQLITE_EXEC="sqlite3" make test-compat
