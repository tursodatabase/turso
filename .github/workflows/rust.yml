name: Rust

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: 10

jobs:
  license-check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check licenses

  cargo-fmt-check:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check
      - name: Check formatting (fuzz)
        run: cd fuzz && cargo fmt --check

  check-bindings:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install bindgen
        run: cargo install --version 0.71.1 bindgen-cli
      - name: Regenerate sdk-kit bindings
        run: cd sdk-kit && ./bindgen.sh
      - name: Regenerate sync/sdk-kit bindings
        run: cd sync/sdk-kit && ./bindgen.sh
      - name: Check bindings are up to date
        run: |
          if ! git diff --exit-code sdk-kit/src/bindings.rs sync/sdk-kit/src/bindings.rs; then
            echo "Bindings are out of date. Run ./bindgen.sh in sdk-kit/ and sync/sdk-kit/ and commit the changes."
            exit 1
          fi

  build-native:
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 120 || 30 }}
    strategy:
      matrix:
        os:
          [
            blacksmith-4vcpu-ubuntu-2404,
            blacksmith-6vcpu-macos-latest,
            windows-latest,
          ]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Setup mold linker
        if: runner.os == 'Linux'
        uses: "./.github/shared/setup-mold"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Install cargo-llvm-cov
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Set up Python 3.10
        uses: useblacksmith/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build
        run: cargo build --verbose --locked --all-features
      - name: Test (nextest with coverage)
        if: runner.os == 'Linux'
        env:
          RUST_LOG: ${{ runner.debug && 'turso_core::storage=trace' || '' }}
          LOCAL_SYNC_SERVER: "../../target/debug/tursodb"
        # for some reason, test(test_busy_snapshot_immediate) hung with coverage - so let's exclude it from the run for now
        run: |
          cargo llvm-cov nextest --workspace --all-features --locked --no-fail-fast --exclude memory-benchmark -E 'not binary(fuzz_tests) and not test(test_busy_snapshot_immediate)' --failure-output=final --html --output-dir coverage
          echo "::group::Coverage Summary"
          cargo llvm-cov report | tee coverage/summary.txt
          echo "::endgroup::"
        timeout-minutes: 20
      - name: Test (nextest)
        if: runner.os != 'Linux'
        env:
          RUST_LOG: ${{ runner.debug && 'turso_core::storage=trace' || '' }}
          LOCAL_SYNC_SERVER: "../../target/debug/tursodb"
        run: cargo nextest run --workspace --all-features --locked --no-fail-fast --exclude memory-benchmark -E 'not binary(fuzz_tests)' --failure-output=final
        timeout-minutes: 30
      - name: Test integrity_check corruption and short reads (no checksum feature because it interferes with the test)
        run: cargo nextest run -p core_tester --locked --no-fail-fast -E 'test(integrity_check) | test(short_read)' --failure-output=final
        timeout-minutes: 5
      - name: Memory leak check (repeated database open/workload/drop)
        run: cargo nextest run -p core_tester --locked --no-fail-fast -E 'binary(leak_tests)' --failure-output=final
        timeout-minutes: 10
      - name: Test doctests
        env:
          LOCAL_SYNC_SERVER: "../../target/debug/tursodb"
        run: cargo test --workspace --all-features --doc --locked --exclude memory-benchmark
      - name: Upload coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build-windows-arm64-cli:
    runs-on: windows-2025
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Windows ARM64 Rust target
        run: rustup target add aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-windows-arm64-cli"
          cache-on-failure: true
      - name: Build Windows ARM64 CLI
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe not found"
          }

          $vcvars = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -find "VC\Auxiliary\Build\vcvarsall.bat" | Select-Object -First 1
          if (!$vcvars) {
            throw "Visual Studio ARM64 build tools not found"
          }

          & $env:ComSpec /c "call `"$vcvars`" x64_arm64 >nul && set CC_aarch64_pc_windows_msvc=cl.exe && cargo build -p turso_cli --bin tursodb --locked --target aarch64-pc-windows-msvc"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

  shuttle-tests:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup mold linker
        uses: "./.github/shared/setup-mold"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-shuttle"
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run shuttle tests
        run: |
          make test-shuttle

  conn-raw-api-tests:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup mold linker
        uses: "./.github/shared/setup-mold"
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-conn-raw-api"
          cache-on-failure: true
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Run conn_raw_api-gated core tests
        run: cargo nextest run -p turso_core --features conn_raw_api --locked --no-fail-fast --failure-output=final

