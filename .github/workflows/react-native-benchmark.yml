name: React Native Benchmark (iOS)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'bindings/react-native/**'
      - 'examples/react-native/**'
      - 'core/**'
      - 'sdk-kit/**'
      - 'sync/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: 10

jobs:
  benchmark-ios:
    name: Build & run iOS benchmark
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-ios-bench"
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Rust iOS libraries (device + simulator)
        working-directory: bindings/react-native
        run: |
          make ios-build
          make package-dylibs

      - name: Install binding dependencies
        working-directory: bindings/react-native
        run: npm install --ignore-scripts

      - name: Install example app dependencies
        working-directory: examples/react-native
        run: npm install --ignore-scripts

      - name: Install CocoaPods
        working-directory: examples/react-native/ios
        run: |
          rm -f Podfile.lock
          pod install

      - name: Bundle JS
        working-directory: examples/react-native
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios

      - name: Build for iOS Simulator
        working-directory: examples/react-native
        run: |
          xcodebuild \
            -workspace ios/TursoExample.xcworkspace \
            -scheme TursoExample \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            -quiet

      - name: Boot iOS Simulator
        run: |
          # Find an available iPhone simulator
          DEVICE_UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime: continue
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      print(d['udid']); sys.exit(0)
          ")
          echo "DEVICE_UDID=$DEVICE_UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$DEVICE_UDID" || true
          sleep 3

      - name: Run benchmark
        timeout-minutes: 8
        working-directory: examples/react-native
        run: |
          APP_PATH=$(find ios/build -name "TursoExample.app" -type d | head -1)
          BUNDLE_ID="org.reactjs.native.example.TursoExample"

          xcrun simctl install "$DEVICE_UDID" "$APP_PATH"
          xcrun simctl launch "$DEVICE_UDID" "$BUNDLE_ID"

          # Poll for the results database file (written by the app when benchmarks finish).
          DATA_DIR=$(xcrun simctl get_app_container "$DEVICE_UDID" "$BUNDLE_ID" data)
          RESULTS_DB="$DATA_DIR/Documents/ci_bench_results.db"
          echo "Waiting for results at: $RESULTS_DB"

          for i in $(seq 1 120); do
            if [ -f "$RESULTS_DB" ]; then
              # Give the app a moment to finish writing
              sleep 2
              echo "Results database found after ~${i}s"
              break
            fi
            sleep 1
          done

          if [ ! -f "$RESULTS_DB" ]; then
            echo "ERROR: Results database not found after 120s"

            echo "=== Crash reports ==="
            find ~/Library/Logs/DiagnosticReports -name "*TursoExample*" -newer "$APP_PATH" 2>/dev/null | head -5
            for f in $(find ~/Library/Logs/DiagnosticReports -name "*TursoExample*" -newer "$APP_PATH" 2>/dev/null | head -1); do
              head -50 "$f"
            done

            echo "=== App process check ==="
            xcrun simctl spawn "$DEVICE_UDID" launchctl list | grep -i turso || echo "App not found"

            echo "=== Files in Documents ==="
            ls -la "$DATA_DIR/Documents/" 2>/dev/null || echo "Documents dir not found"

            exit 1
          fi

          echo "=== Benchmark Results ==="
          sqlite3 "$RESULTS_DB" "SELECT status, name, COALESCE(metric,''), COALESCE(error,'') FROM results;" | while IFS='|' read -r status name metric error; do
            extra=""
            [ -n "$metric" ] && extra=" [$metric]"
            [ -n "$error" ] && extra="$extra ERROR: $error"
            echo "[$status] $name$extra"
          done

          echo ""
          sqlite3 "$RESULTS_DB" "SELECT 'SUMMARY: ' || passed || ' passed, ' || failed || ' failed' FROM summary;"

          EXIT_CODE=$(sqlite3 "$RESULTS_DB" "SELECT exit_code FROM summary LIMIT 1;")
          exit "${EXIT_CODE:-1}"

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "$DEVICE_UDID" 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            ~/Library/Developer/CoreSimulator/Devices/*/data/Containers/Data/Application/*/Documents/ci_bench_results.db
          if-no-files-found: ignore
