# Heavy Aristo canon verification (`aristo verify`).
#
# Unlike the cheap stamp/lint checks in aristo.yml (which run on every PR with
# no token), `verify` validates intent annotations against the canon and needs
# the ARETTA_TOKEN secret.
#
# For now this is a manual workflow so we can opt in to runs while we evaluate
# cost and signal. To exercise it from a PR, the `pull_request` trigger below is
# enabled temporarily — note `workflow_dispatch` alone can't be triggered from a
# PR branch, it only dispatches workflows already on the default branch. Once
# we're happy, drop the `pull_request` trigger and/or enable the nightly cron.
name: Aristo verify

on:
  workflow_dispatch:
  # Temporary: lets us trigger verify from a PR to test it. Remove once merged.
  pull_request:
    branches:
      - main
  # Nightly run — enable once verify is proven out in CI.
  # schedule:
  #   - cron: '0 7 * * *' # nightly at 07:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify intent annotations
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aretta-ai/aristo-action@v1
        with:
          checks: verify
          aretta-token: ${{ secrets.ARETTA_TOKEN }}
