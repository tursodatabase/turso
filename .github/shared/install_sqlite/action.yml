name: "Install SQLite"
description: "Installs sqlite3 CLI for compat tests that invoke it as a subprocess (make test-compat)"

runs:
  using: "composite"
  steps:
    - name: Install SQLite
      run: |
        SQLITE_VERSION_FILE="$GITHUB_WORKSPACE/scripts/sqlite-version.env"
        # shellcheck source=/dev/null
        . "$SQLITE_VERSION_FILE"
        curl -o /tmp/sqlite.zip "https://sqlite.org/$SQLITE_YEAR/sqlite-tools-linux-x64-$SQLITE_VERSION.zip" > /dev/null
        echo "y" | unzip -j /tmp/sqlite.zip sqlite3 -d /usr/local/bin/
        sqlite3 --version
      shell: bash
