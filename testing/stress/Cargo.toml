[package]
name = "turso_stress"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "The Limbo stress tester"
publish = false

[lints]
workspace = true

[lib]
path = "lib.rs"

[[bin]]
name = "turso_stress"
path = "main.rs"

[features]
default = []
# Enables the real io_uring IO backend (Linux only) so the shuttle tests can
# drive `turso_core::UringIO` directly. Used by the io_uring step()
# leader/follower deadlock regression test in tests/shuttle_mvcc.rs.
io_uring = ["turso_core/io_uring"]

[dependencies]
clap = { workspace = true, features = ["derive"] }
hex = { workspace = true }
indicatif = { workspace = true }
rand = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing-appender = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
turso = { workspace = true, features = ["io_memory_yield"] }
turso_core = { workspace = true, features = ["simulator"] }
turso_macros = { workspace = true }
rusqlite = { workspace = true }

[target.'cfg(antithesis)'.dependencies]
antithesis_sdk = { workspace = true, features = ["full"] }
serde_json = { workspace = true }

[target.'cfg(shuttle)'.dependencies]
shuttle = { workspace = true }

