[package]
name = "turso"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Turso Rust API"

[features]
default = []
experimental_indexes = []
antithesis = ["turso_core/antithesis"]

[dependencies]
turso_core = { workspace = true, features = ["io_uring"] }
thiserror = "2.0.9"
http = "1.3.1"
hyper = { version = "1.6.0", features = ["client", "full", "http1"] }
reqwest = { version = "0.12.22", features = ["stream"] }
serde_json.workspace = true
serde = { workspace = true, features = ["derive"] }
futures-core = "0.3.31"
futures-util = "0.3.31"
tokio = { version = "1.29.1", features = ["fs"] }
zerocopy = "0.8.26"

[dev-dependencies]
tempfile = "3.20.0"
tokio = { version = "1.29.1", features = ["full"] }
